<div class="w-full animate-fade-in">

  <!-- Marca (solo móvil, en escritorio ya está en el panel izquierdo) -->
  <div class="lg:hidden flex items-center gap-2.5 mb-8">
    <img src="logo2.svg" alt="Logo Sistema de Farmacia" class="w-9 h-9 object-contain" />
    <span class="font-semibold text-slate-900 tracking-tight">Sistema de Farmacia</span>
  </div>

  <div class="mb-7">
    <h1 class="text-2xl font-bold text-slate-900 mb-1.5 tracking-tight">Bienvenido de nuevo</h1>
    <p class="text-slate-500 text-sm">Ingresa tus credenciales para acceder al sistema.</p>
  </div>

  <div class="mb-6 rounded-lg border border-blue-100 bg-blue-50/70 p-3.5">
    <p class="text-[11px] font-semibold text-blue-800 mb-2 uppercase tracking-wider">Credenciales de prueba (demo sin backend)</p>
    <div class="divide-y divide-blue-100/80">
      <button type="button" (click)="fillDemo('propietario@farmacia.com', 'admin123')" class="w-full flex items-center justify-between text-left py-2 first:pt-0 last:pb-0 hover:bg-blue-100/40 transition-colors cursor-pointer rounded px-1.5 -mx-1.5">
        <span class="min-w-0 text-xs">
          <span class="font-semibold text-slate-800">Administrador</span>
          <span class="text-slate-500"> · propietario&#64;farmacia.com</span>
        </span>
        <span class="text-[11px] text-blue-700 font-mono shrink-0 ml-2">admin123</span>
      </button>
      <button type="button" (click)="fillDemo('asistente@farmacia.com', 'asistente123')" class="w-full flex items-center justify-between text-left py-2 first:pt-0 last:pb-0 hover:bg-blue-100/40 transition-colors cursor-pointer rounded px-1.5 -mx-1.5">
        <span class="min-w-0 text-xs">
          <span class="font-semibold text-slate-800">Asistente</span>
          <span class="text-slate-500"> · asistente&#64;farmacia.com</span>
        </span>
        <span class="text-[11px] text-blue-700 font-mono shrink-0 ml-2">asistente123</span>
      </button>
    </div>
  </div>

  <form class="space-y-4" (ngSubmit)="onSubmit()">
    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1.5">Usuario o Correo</label>
      <input type="email" [(ngModel)]="email" name="email" [disabled]="loading" class="w-full px-3 py-2.5 bg-white border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-800/20 focus:border-blue-800 transition-colors text-slate-800 text-sm disabled:opacity-50" />
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1.5">Contraseña</label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" [disabled]="loading" class="w-full px-3 py-2.5 pr-10 bg-white border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-800/20 focus:border-blue-800 transition-colors text-slate-800 text-sm disabled:opacity-50" />
        <button type="button" (click)="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 cursor-pointer">
          <svg *ngIf="!showPassword" class="h-[17px] w-[17px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
          <svg *ngIf="showPassword" class="h-[17px] w-[17px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
          </svg>
        </button>
      </div>
    </div>

    <div class="flex items-center justify-between pt-1">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" class="rounded border-slate-300 text-blue-800 focus:ring-blue-800 h-3.5 w-3.5" />
        <span class="text-xs text-slate-600">Mantener sesión iniciada</span>
      </label>
      <button type="button" (click)="resetDemo()" class="text-xs text-slate-500 hover:text-blue-800 transition-colors cursor-pointer">¿Cuenta bloqueada? Reiniciar demo</button>
    </div>

    <!-- Ejecuta la acción de Login real -->
    <div class="pt-3">
      <button type="submit" [disabled]="loading" class="w-full py-3 px-4 bg-blue-800 hover:bg-blue-900 text-white font-semibold text-sm rounded-md text-center transition-colors shadow-sm hover:shadow disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2 cursor-pointer">
        <svg *ngIf="loading" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ loading ? 'Ingresando...' : 'Acceder al Sistema' }}</span>
      </button>
    </div>
  </form>

  <div class="lg:hidden mt-8 pt-5 border-t border-slate-100 text-center">
    <p class="text-[11px] text-slate-400">© 2026 Sistema de Farmacia. Prototipo Funcional.</p>
  </div>
</div>
